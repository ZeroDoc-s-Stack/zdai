# Development override: mounts ~/.claude so agent and skill changes take
# effect immediately without rebuilding the image.
#
# Usage:  podman-compose -f compose.dev.yml up
services:
  zdai:
    image: zdai-dev
    volumes:
      - /mnt/v1drive/syncthing/data1:/vault:ro
      - /home/zerodoc/scripts:/scripts:ro
      - /home/zerodoc/.local/state/zdai:/state
      - /home/zerodoc/.claude:/root/.claude   # override baked agents/skills
    environment:
      - ANTHROPIC_API_KEY
      - OPENROUTER_API_KEY
      - TASKNOTES_MCP_URL=http://host.containers.internal:8080/mcp
    network_mode: host
